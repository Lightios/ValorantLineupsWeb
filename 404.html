<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
        const repoName = 'ValorantLineupsWeb';
        
        // Pobieramy aktualną ścieżkę
        let path = window.location.pathname;
        
        if (path.startsWith('/' + repoName)) {
            path = path.substring(repoName.length + 1);
        }
        
        if (path.startsWith('/')) {
            path = path.substring(1);
        }

        const query = window.location.search;
        const hash = window.location.hash;
        const encoded = encodeURIComponent(path + query + hash);

        const target = window.location.origin + '/' + repoName + '/?redirect=' + encoded;

        window.location.replace(target);
    </script>
</head>
<body>
    Przekierowywanie do aplikacji...
</body>
</html>
